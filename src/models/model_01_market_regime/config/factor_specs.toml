# MarketRegimeModel V1 factor specification.
#
# This file owns factor membership, signal direction, reducer choice, and
# standardization defaults. The Python generator owns only point-in-time rolling
# standardization and execution mechanics.
#
# Supported reducers:
# - bounded_mean: tanh(mean(zscores) / 2)
# - bounded_abs_mean: tanh(mean(abs(zscores)) / 2)
#
# Supported aggregations:
# - flat: reduce all eligible signals directly.
# - bucketed_mean: first average eligible signals by bucket, then reduce bucket scores.
#
# Signal groups support either:
# - columns = ["exact_column_name", ...]
# - symbols = ["spy", ...] plus suffixes = ["return_20d", ...]
#
# direction = 1 means higher raw signal increases the factor.
# direction = -1 means higher raw signal decreases the factor.
#
# V1.3 expresses Layer 1 output as market-property factors rather than
# proxy-dashboard factors while keeping sector/industry rotation out of Model 1. Generated data should have an explicit owner: used by
# a factor, retained as diagnostic/quality/evaluation evidence, or removed.

[standardization]
lookback = 120
min_history = 20
std_floor = 1e-8
z_clip = 5.0
min_signal_coverage = 0.5

[[factors]]
name = "price_behavior_factor"
reducer = "bounded_mean"
aggregation = "bucketed_mean"
min_signal_coverage = 0.3
[[factors.groups]]
symbols = ["spy", "qqq", "iwm", "dia", "rsp"]
suffixes = [
  "return_30m",
  "return_1d",
  "return_5d",
  "distance_to_ma20",
  "ma20_slope_5d",
]
direction = 1
min_history = 20
